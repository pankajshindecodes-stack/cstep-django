services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "8189:8189/udp" # WebRTC ICE/UDP
    volumes:
      - ./docker/mediamtx/mediamtx.yml:/mediamtx.yml:ro
